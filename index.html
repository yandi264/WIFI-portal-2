<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>WiFi Legion</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0; padding: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        height: 100vh;
        background: url('https://i.ibb.co/xj0yZkP/fondo-wifi-tecnologia.png') no-repeat center center fixed;
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
    }
    .container {
        background: rgba(0,0,0,0.8);
        border-radius: 10px;
        width: 360px;
        max-width: 90%;
        padding: 20px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .tabs {
        display: flex;
        margin-bottom: 15px;
    }
    .tablink {
        flex: 1;
        padding: 10px;
        background: rgba(255,255,255,0.1);
        border: none; color: white; cursor: pointer;
        font-size: 16px;
    }
    .tablink.active { background: #4facfe; }
    .tabcontent { display: none; }
    .tabcontent.active { display: block; }
    .box {
        background: rgba(0,0,0,0.7);
        padding: 20px;
        border-radius: 10px;
        text-align: center;
    }
    .box img { width: 120px; margin: 0 auto 15px; display: block; }
    .box h2 { margin: 10px 0; font-size: 20px; }
    .box p  { margin-bottom: 15px; }
    .box input {
        padding: 10px; margin-bottom: 10px; width: 95%;
        border-radius: 5px; border: 1px solid #ccc;
    }
    .box input:focus {
        outline: none; border-color: #4facfe;
        box-shadow: 0 0 5px rgba(79,172,254,0.7);
    }
    .box button {
        background: #4facfe; color: white; border: none;
        padding: 10px 20px; border-radius: 5px;
        font-size: 16px; font-weight: bold; cursor: pointer;
    }
    .price-table {
        width: 100%; border-collapse: collapse; margin-top: 10px;
    }
    .price-table th, .price-table td {
        border: 1px solid #ccc; padding: 8px; text-align: center;
    }
    .price-table th {
        background: #4facfe; color: #fff;
    }
    .price-table td {
        background: rgba(255,255,255,0.1);
    }
    .price-table tr:nth-child(odd) td {
        background: rgba(255,255,255,0.2);
    }
    .price-table button {
        background: #f57c00; color: white;
        border: none; padding: 5px 10px; border-radius: 5px;
        cursor: pointer; font-weight: bold;
    }
    @media (max-width: 400px) {
        .price-table th, .price-table td { font-size: 12px; }
    }
</style>
</head>
<body>
<div class="container">
    <!-- Pestañas -->
    <div class="tabs">
        <button class="tablink active" data-tab="usuario">Usuario</button>
        <button class="tablink" data-tab="precios">Precios/Ofertas</button>
    </div>
    <!-- Pestaña Usuario -->
    <div id="usuario" class="tabcontent active">
        <div class="box">
            <!-- Logo de ejemplo (reemplazar URL) -->
            <img src="https://tusitio.com/logo.png" alt="Logo">
            <h2>¡Bienvenido a WiFi Legion!</h2>
            <p>Completa el formulario y espera 5 segundos para conectarte.</p>
            <form id="formulario" onsubmit="enviarFormulario(event)">
                <input type="text" placeholder="Tu nombre" required><br>
                <input type="email" placeholder="Tu email" required><br>
                <button id="btnContinuar" type="submit" disabled>Aceptar y continuar (5)</button>
            </form>
            <!-- Banner de publicidad de ejemplo -->
            <div class="banner">
                <a href="https://tusitio.com" target="_blank">
                    <img src="https://tusitio.com/banner.png" alt="Publicidad">
                </a>
            </div>
        </div>
    </div>
    <!-- Pestaña Precios/Ofertas -->
    <div id="precios" class="tabcontent">
        <div class="box">
            <h2>Planes y Ofertas</h2>
            <p>Elige el plan que deseas contratar:</p>
            <table class="price-table">
                <tr>
                    <th>Plan</th><th>Velocidad</th><th>Duración</th><th>Precio</th><th></th>
                </tr>
                <tr>
                    <td>Básico</td><td>5 Mbps</td><td>1 hora</td><td>$0 (gratis)</td>
                    <td><button onclick="contratar('Básico')">Conectar</button></td>
                </tr>
                <tr>
                    <td>Intermedio</td><td>10 Mbps</td><td>2 horas</td><td>$1.99</td>
                    <td><button onclick="contratar('Intermedio')">Contratar</button></td>
                </tr>
                <tr>
                    <td>Premium</td><td>20 Mbps</td><td>4 horas</td><td>$3.99</td>
                    <td><button onclick="contratar('Premium')">Contratar</button></td>
                </tr>
            </table>
        </div>
    </div>
</div>
<script>
    // Cambiar pestañas
    document.querySelectorAll('.tablink').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tablink').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tabcontent').forEach(tc => tc.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.getAttribute('data-tab')).classList.add('active');
        });
    });
    // Temporizador de 5 segundos
    let tiempo = 5;
    const btn = document.getElementById('btnContinuar');
    const countdown = setInterval(() => {
        tiempo--;
        btn.innerText = `Aceptar y continuar (${tiempo})`;
        if (tiempo <= 0) {
            clearInterval(countdown);
            btn.innerText = 'Aceptar y continuar';
            btn.disabled = false;
        }
    }, 1000);
    // Función al enviar el formulario
    function enviarFormulario(e) {
        e.preventDefault();
        alert("¡Gracias! Serás redirigido.");
        window.location.href = "http://google.com"; // Cambia esta URL por la de destino final
    }
    // Función al contratar un plan (simula cambiar a pestaña Usuario)
    function contratar(plan) {
        alert("Seleccionaste el plan " + plan + ". Serás redirigido al formulario de usuario.");
        document.querySelector('[data-tab="usuario"]').click();
    }
</script>
</body>
</html>
